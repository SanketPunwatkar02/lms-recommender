# Render Configuration for LMS Recommender

# This file is used to configure the deployment of the LMS Recommender on Render.

services:
  - type: web
    name: lms-recommender
    env: python
    plan: starter
    runtime: python3.8
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars: []
    autoDeploy: true
    region: oregon